<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0a0a1a"/>
  <title>Hey Brandon 💛</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overscroll-behavior:none;background:#0a0a1a;}
body{-webkit-tap-highlight-color:transparent;font-family:'Outfit',system-ui,sans-serif;color:#fff;}
input,textarea,button{font-family:inherit;}
::-webkit-scrollbar{display:none;}
button{cursor:pointer;transition:opacity 0.14s;}
button:active{opacity:0.75;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1}}
@keyframes saber{0%{box-shadow:0 0 8px #4fc3f7,0 0 20px #4fc3f7}50%{box-shadow:0 0 14px #4fc3f7,0 0 40px #4fc3f7,0 0 60px rgba(79,195,247,0.3)}100%{box-shadow:0 0 8px #4fc3f7,0 0 20px #4fc3f7}}
@keyframes heartPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

.fade-up{animation:fadeUp 0.5s ease both;}
.pop-in{animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;}
.float{animation:float 3s ease-in-out infinite;}
.shimmer-text{background:linear-gradient(90deg,#ffd700,#fff,#ffd700,#fff,#ffd700);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;}
.saber-glow{animation:saber 2s ease-in-out infinite;}
.heart-pulse{animation:heartPulse 1.5s ease-in-out infinite;}
.star{position:fixed;border-radius:50%;background:#fff;animation:twinkle var(--dur,3s) ease-in-out infinite;animation-delay:var(--del,0s);}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
  <script type="text/babel">

var useState = React.useState;
var useEffect = React.useEffect;

var HYPE_MESSAGES = [
  {e:"⚔️", img:"https://static.wikia.nocookie.net/inuyasha/images/4/4e/Inuyasha_Anime.jpg", quote:"\"I am not afraid to die protecting what is important to me.\"", char:"Inuyasha", vibe:"I watch you fight like that every single day, and honestly? It makes my whole heart full."},
  {e:"🌙", img:"https://static.wikia.nocookie.net/inuyasha/images/6/6e/Sessh%C5%8Dmaru_Anime.jpg", quote:"\"It is not that I care about you. I simply... find myself unwilling to see you suffer.\"", char:"Sesshomaru", vibe:"(I am Sesshomaru in this scenario. I would never admit it. But I find myself unwilling to see you suffer. Obviously.)"},
  {e:"🌸", img:"https://static.wikia.nocookie.net/inuyasha/images/8/8d/Kagome_Higurashi.jpg", quote:"\"Even if I lose this feeling, I'll still keep on loving you.\"", char:"Kagome", vibe:"I picked this one for you on purpose. Because that's exactly how I feel about you."},
  {e:"🚀", img:"https://static.wikia.nocookie.net/starwars/images/e/e4/HanSolo.jpg", quote:"\"Never tell me the odds!\"", char:"Han Solo", vibe:"The odds were 3,720 to 1 and he did it anyway. I've never once doubted you'd do the same."},
  {e:"⭐", img:"https://static.wikia.nocookie.net/starwars/images/e/e4/HanSolo.jpg", quote:"\"I've got a bad feeling about this.\"", char:"Han Solo", vibe:"Same, honestly. But I've watched you come out the other side every single time, and I'm not stopping my watch now."},
  {e:"🌺", img:"https://static.wikia.nocookie.net/inuyasha/images/4/4e/Inuyasha_Anime.jpg", quote:"\"I didn't ask for your help!\" \"And yet here I am.\"", char:"Inuyasha & Kagome", vibe:"I didn't wait to be asked either. I'm just here. That's the whole thing."},
  {e:"🐾", img:"https://static.wikia.nocookie.net/inuyasha/images/4/4e/Inuyasha_Anime.jpg", quote:"\"I want to protect her. Even if it destroys me.\"", char:"Inuyasha", vibe:"The way you love people like this — I see it, Brandon. I see it and I think about it all the time."},
  {e:"🌟", img:"https://static.wikia.nocookie.net/starwars/images/e/e4/HanSolo.jpg", quote:"\"Don't let anyone make you feel like you don't deserve what you want.\"", char:"Han Solo (vibes)", vibe:"I need you to hear this one from me specifically: you deserve everything. I mean that. Everything."},
  {e:"🦊", img:"https://static.wikia.nocookie.net/inuyasha/images/5/50/Shippo.jpg", quote:"\"I'm scared. But I'm still going.\"", char:"Shippo", vibe:"This one reminded me most of you. Small, brave, terrified, loyal, absolutely going anyway. I love that about you so much."},
];

var REASONS = [
  {e:"🫂", t:"You make my hard days lighter just by existing"},
  {e:"💡", t:"You notice things other people walk right past"},
  {e:"🐺", t:"You have Sesshomaru-level composure and I genuinely admire it"},
  {e:"😂", t:"Your laugh is one of my favourite sounds in the world"},
  {e:"🌸", t:"You love people the way Kagome does — completely and without conditions"},
  {e:"🚀", t:"You never back down from what matters — very Han Solo of you, I love it"},
  {e:"🔥", t:"When you believe in something you go all in and it's incredible to witness"},
  {e:"🌙", t:"You are beautiful even on the days you can't see it yourself"},
  {e:"⚔️", t:"You've overcome things that would have stopped most people cold"},
  {e:"💛", t:"You are, without question, one of my favourite people on this planet"},
];

var AFFIRMATIONS = [
  "You are not too much. You are exactly enough. I need you to believe that.",
  "I genuinely think the world needed you specifically in it. Not a version of you. You.",
  "Sesshomaru didn't become Lord of the Western Lands by being 'pretty good.' You're not 'pretty good' either. You're the whole thing.",
  "Han Solo flew through an asteroid field at 3,720-to-1 odds. I have seen you do harder things than that.",

  "I know you think you're behind. You're not. You are doing so much better than you think.",
  "Bad day? Even Kagome fell into the well. She still came back. You always come back too.",
  "You are someone's favourite part of the day. You are my favourite part of many days.",
  "The force is strong with this one. This one is you. I've always thought so.",
  "You are braver right now, in this moment, than you are giving yourself credit for.",
  "Sesshomaru crossed dimensions for Rin. I would cross a lot of things for you too.",
  "Rest is not giving up. Even Han Solo had to land the Falcon. Let yourself land sometimes.",
];

var JOKES = [
  {setup:"Why did Inuyasha cross the road?", punchline:"To get to Kagome's era. Also there was a demon on the other side. Also he just wanted ramen."},
  {setup:"What does Sesshomaru say at the dinner table?", punchline:"\"I did not come here to eat. I came here to dominate the table setting. ...This soup is acceptable.\""},
  {setup:"Han Solo walks into a bar.", punchline:"He shoots first. The bartender gives him a drink. Nobody questions it."},
  {setup:"Why is Kagome an amazing student?", punchline:"She has a time machine and still shows up for the people she loves. Extra credit: unlimited."},
  {setup:"Inuyasha vs a to-do list:", punchline:"\"I'll WIND SCAR this list!\" *the dishes are still not done* *Kagome sighs*"},
  {setup:"What's Sesshomaru's morning routine?", punchline:"Wake up. Stare into the middle distance. Contemplate the nature of power. Silently acknowledge that Rin made him breakfast. Never say thank you. Leave. (He appreciates it deeply.)"},
  {setup:"Shippo tries to help with a problem:", punchline:"\"I can handle it! I'm not scared! I'm a fox demon!\" *immediately trips over his own tail* *gets back up* *tries again* *you love him so much*"},
];

function Stars() {
  var items = [];
  for (var i = 0; i < 40; i++) {
    var size = Math.random() * 2.5 + 1;
    items.push(
      React.createElement('div', {
        key: i, className: 'star',
        style: {width:size+'px',height:size+'px',left:Math.random()*100+'vw',top:Math.random()*100+'vh',
          '--dur':(2+Math.random()*4)+'s','--del':(Math.random()*4)+'s',opacity:0.3+Math.random()*0.5}
      })
    );
  }
  return React.createElement('div', null, items);
}

function HeroSection(props) {
  return (
    <div className="fade-up" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",textAlign:"center",position:"relative",zIndex:1}}>
      <div className="float" style={{fontSize:72,marginBottom:20}}>🌸</div>
      <div style={{fontSize:13,fontWeight:700,letterSpacing:"3px",color:"rgba(255,215,0,0.7)",marginBottom:12,textTransform:"uppercase"}}>A message for</div>
      <div style={{fontSize:52,fontWeight:900,lineHeight:1.1,marginBottom:16}}>
        <span className="shimmer-text">Hey, Brandon.</span>
      </div>
      <div style={{fontSize:18,color:"rgba(255,255,255,0.7)",lineHeight:1.7,maxWidth:340,marginBottom:36}}>
        I made this for you, and I'd make it a{" "}
        <span style={{color:"rgba(255,215,0,0.9)",fontWeight:700}}>thousand times.</span>
      </div>
      <button onClick={props.onNext} style={{background:"linear-gradient(135deg,#ffd700,#ff9f0a)",border:"none",borderRadius:50,padding:"15px 36px",fontSize:16,fontWeight:800,color:"#000",boxShadow:"0 8px 30px rgba(255,215,0,0.4)"}}>
        Let's go ✨
      </button>
    </div>
  );
}

function QuotesSection() {
  return (
    <div style={{padding:"24px 18px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:13,fontWeight:700,letterSpacing:"3px",color:"rgba(255,215,0,0.7)",marginBottom:8,textTransform:"uppercase"}}>Words that slap</div>
        <div style={{fontSize:26,fontWeight:900}}>Quotes that are basically about you</div>
      </div>
      {HYPE_MESSAGES.map(function(q, i) {
        return (
          <div key={i} className="pop-in" style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:20,padding:"22px 20px",marginBottom:14,animationDelay:(i*0.05)+"s"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <div style={{position:"relative",width:40,height:40,flexShrink:0}}>
                <img src={q.img} alt={q.char}
                  onError={function(ev){ev.target.style.display="none";ev.target.nextSibling.style.display="flex";}}
                  style={{width:40,height:40,borderRadius:"50%",objectFit:"cover",border:"1.5px solid rgba(255,215,0,0.4)",display:"block"}}/>
                <div style={{display:"none",width:40,height:40,borderRadius:"50%",background:"rgba(255,215,0,0.1)",border:"1.5px solid rgba(255,215,0,0.4)",alignItems:"center",justifyContent:"center",fontSize:20,position:"absolute",top:0,left:0}}>
                  {q.e}
                </div>
              </div>

            <div style={{fontSize:13,color:"rgba(255,255,255,0.55)",lineHeight:1.6,borderLeft:"2px solid rgba(255,215,0,0.3)",paddingLeft:12}}>{q.vibe}</div>
          </div>

}

function ReasonsSection() {
  var revState = useState({});
  var rev = revState[0]; var setRev = revState[1];
  function toggle(i) { var n = Object.assign({}, rev); n[i] = !n[i]; setRev(n); }
  return (
    <div style={{padding:"24px 18px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:13,fontWeight:700,letterSpacing:"3px",color:"rgba(79,195,247,0.8)",marginBottom:8,textTransform:"uppercase"}}>No cap, all facts</div>
        <div style={{fontSize:26,fontWeight:900}}>10 reasons you're incredible</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:6}}>Tap any for a quick hype boost</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {REASONS.map(function(r, i) {
          var open = !!rev[i];
          return (
            <div key={i} onClick={function(){toggle(i);}} style={{background:open?"rgba(79,195,247,0.1)":"rgba(255,255,255,0.04)",border:"1px solid "+(open?"rgba(79,195,247,0.4)":"rgba(255,255,255,0.08)"),borderRadius:16,padding:"16px 14px",cursor:"pointer",transition:"all 0.2s"}}>
              <div style={{fontSize:28,marginBottom:8}}>{r.e}</div>
              <div style={{fontSize:12,fontWeight:700,color:open?"#4fc3f7":"rgba(255,255,255,0.8)",lineHeight:1.4}}>{r.t}</div>
              {open && <div style={{fontSize:11,color:"rgba(79,195,247,0.6)",marginTop:6}}>✓ confirmed</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AffirmationSection() {
  var idxS = useState(0); var idx = idxS[0]; var setIdx = idxS[1];
  var keyS = useState(0); var animKey = keyS[0]; var setAnimKey = keyS[1];
  function go(dir) { setIdx(function(i){ return (i + dir + AFFIRMATIONS.length) % AFFIRMATIONS.length; }); setAnimKey(function(k){ return k+1; }); }
  return (
    <div style={{padding:"24px 18px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:13,fontWeight:700,letterSpacing:"3px",color:"rgba(191,90,242,0.8)",marginBottom:8,textTransform:"uppercase"}}>Daily hype drop</div>
        <div style={{fontSize:26,fontWeight:900}}>Things you need to hear</div>
      </div>
      <div style={{background:"rgba(191,90,242,0.07)",border:"1px solid rgba(191,90,242,0.25)",borderRadius:22,padding:"30px 24px",textAlign:"center",marginBottom:16,minHeight:140,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div key={animKey} className="fade-up" style={{fontSize:17,fontWeight:700,lineHeight:1.7,color:"rgba(255,255,255,0.95)"}}>
          {AFFIRMATIONS[idx]}
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={function(){go(-1);}} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,padding:"12px",fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.6)"}}>← Previous</button>
        <button onClick={function(){go(1);}} style={{flex:1,background:"rgba(191,90,242,0.15)",border:"1px solid rgba(191,90,242,0.4)",borderRadius:14,padding:"12px",fontSize:14,fontWeight:800,color:"#bf5af2"}}>Next one →</button>
      </div>
      <div style={{textAlign:"center",marginTop:10,fontSize:12,color:"rgba(255,255,255,0.25)"}}>{idx+1} / {AFFIRMATIONS.length}</div>
    </div>
  );
}

function JokesSection() {
  var openS = useState(null); var open = openS[0]; var setOpen = openS[1];
  return (
    <div style={{padding:"24px 18px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:13,fontWeight:700,letterSpacing:"3px",color:"rgba(48,209,88,0.8)",marginBottom:8,textTransform:"uppercase"}}>Certified fresh</div>
        <div style={{fontSize:26,fontWeight:900}}>Tap to reveal the punchline</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:6}}>Warning: these are extremely good</div>
      </div>

        var isOpen = open === i;
        return (
          <div key={i} onClick={function(){setOpen(isOpen ? null : i);}} style={{background:isOpen?"rgba(48,209,88,0.07)":"rgba(255,255,255,0.04)",border:"1px solid "+(isOpen?"rgba(48,209,88,0.3)":"rgba(255,255,255,0.08)"),borderRadius:18,padding:"18px",marginBottom:12,cursor:"pointer",transition:"all 0.2s"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              <div style={{fontSize:22,flexShrink:0}}>{"😂"}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.9)",lineHeight:1.5,marginBottom:isOpen?12:0}}>{j.setup}</div>
                {isOpen && <div className="fade-up" style={{fontSize:14,color:"rgba(48,209,88,0.9)",lineHeight:1.6,fontStyle:"italic"}}>{j.punchline}</div>}
              </div>
              <div style={{fontSize:16,color:"rgba(255,255,255,0.3)",flexShrink:0,marginTop:2}}>{isOpen?"▲":"▼"}</div>
            </div>

function SaberSection() {
  var activeS = useState(null); var active = activeS[0]; var setActive = activeS[1];
  return (
    <div style={{padding:"24px 18px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:13,fontWeight:700,letterSpacing:"3px",color:"rgba(79,195,247,0.8)",marginBottom:8,textTransform:"uppercase"}}>Weapon of choice</div>
        <div style={{fontSize:26,fontWeight:900}}>Which are you wielding today?</div>
      </div>
      <div style={{display:"flex",gap:12,marginBottom:20}}>
        {[
          {id:"saber", e:"🔵", label:"Lightsaber", sub:"Han Solo mode", color:"#4fc3f7", msg:"\"Kid, I've been from one end of this galaxy to the other and I've never seen anything that makes me believe you can't handle today.\"", title:"Han Solo Energy Activated"},
          {id:"tetsusaiga", e:"⚔️", label:"Tetsusaiga", sub:"Inuyasha mode", color:"#ffd700", msg:"\"Wind Scar!\" — You've got a weapon that gets stronger when you protect the people you love. Use it.", title:"Inuyasha Energy Activated"},
        ].map(function(w) {
          var on = active === w.id;
          return (
            <div key={w.id} onClick={function(){setActive(on ? null : w.id);}} style={{flex:1,background:on?"rgba("+( w.id==="saber"?"79,195,247":"255,215,0")+",0.12)":"rgba(255,255,255,0.04)",border:"2px solid "+(on?w.color:"rgba(255,255,255,0.08)"),borderRadius:20,padding:"24px 14px",textAlign:"center",cursor:"pointer",transition:"all 0.2s"}}>
              <div style={{fontSize:40,marginBottom:10}}>{w.e}</div>
              <div className={on&&w.id==="saber"?"saber-glow":""} style={{width:4,height:80,background:on?w.color:"rgba(255,255,255,0.2)",borderRadius:2,margin:"0 auto 12px",boxShadow:on?"0 0 12px "+w.color+",0 0 30px "+w.color:"none",transition:"all 0.3s"}}/>

        var w = active==="saber" ? {color:"#4fc3f7",title:"Han Solo Energy Activated",msg:"\"Kid, I've been from one end of this galaxy to the other and I've never seen anything that makes me believe you can't handle today.\""} : {color:"#ffd700",title:"Inuyasha Energy Activated",msg:"\"Wind Scar!\" — You've got a weapon that gets stronger when you protect the people you love. Use it."};

          <div className="fade-up" style={{background:"rgba(255,255,255,0.04)",border:"1px solid "+(w.color+"44"),borderRadius:16,padding:"18px",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,color:w.color,marginBottom:8}}>{w.title}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.65)",lineHeight:1.7}}>{w.msg}</div>
          </div>
        );
      })()}
    </div>
  );
}

function ClosingSection() {
  return (
    <div style={{padding:"24px 18px 60px",textAlign:"center"}}>
      <div className="heart-pulse" style={{fontSize:60,marginBottom:24}}>💛</div>
      <div style={{fontSize:28,fontWeight:900,marginBottom:16,lineHeight:1.3}}>
        I love you, Brandon.<br/>
        <span className="shimmer-text">Full stop.</span>
      </div>
      <div style={{fontSize:15,color:"rgba(255,255,255,0.6)",lineHeight:1.8,maxWidth:340,margin:"0 auto 24px"}}>
        Not because of what you do.<br/>
        Not because of how you perform.<br/>
        Just because you're <span style={{color:"#ffd700",fontWeight:700}}>you</span>, and that has always been more than enough for me.
      </div>
      <div style={{background:"rgba(255,215,0,0.06)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:18,padding:"20px",maxWidth:360,margin:"0 auto"}}>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",lineHeight:1.8}}>

        </div>
        <div style={{fontSize:14,fontWeight:800,color:"#ffd700",marginTop:12}}>
          You belong in that lineup, Brandon. You always have. 🌟
        </div>
        <div style={{fontSize:15,fontWeight:700,color:"rgba(255,215,0,0.85)",marginTop:16,lineHeight:1.7,fontStyle:"italic"}}>
          I love you until the moon no longer exists.
        </div>
      </div>
    </div>
  );
}

var TABS = [
  {id:"quotes",  e:"⚔️", label:"Quotes"},
  {id:"reasons", e:"💛", label:"Reasons"},
  {id:"hype",    e:"🌟", label:"Hype"},
  {id:"jokes",   e:"😂", label:"Jokes"},
  {id:"saber",   e:"🔵", label:"Weapon"},
  {id:"love",    e:"🌸", label:"You"},
];

function App() {
  var startS = useState(false); var started = startS[0]; var setStarted = startS[1];
  var tabS = useState("quotes"); var tab = tabS[0]; var setTab = tabS[1];

  if (!started) {
    return (
      <div style={{position:"relative",minHeight:"100vh",background:"#0a0a1a"}}>
        <Stars/>
        <HeroSection onNext={function(){setStarted(true);}}/>
      </div>
    );
  }

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:"#0a0a1a",position:"relative"}}>
      <Stars/>
      <div style={{flex:1,overflowY:"auto",paddingBottom:76,position:"relative",zIndex:1}}>
        {tab==="quotes"  && <QuotesSection/>}
        {tab==="reasons" && <ReasonsSection/>}
        {tab==="hype"    && <AffirmationSection/>}
        {tab==="jokes"   && <JokesSection/>}
        {tab==="saber"   && <SaberSection/>}
        {tab==="love"    && <ClosingSection/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(10,10,26,0.93)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,215,0,0.1)",padding:"6px 0 10px",zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-around"}}>
          {TABS.map(function(n) {
            var active = tab === n.id;
            return (
              <button key={n.id} onClick={function(){setTab(n.id);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"transparent",border:"none",padding:"5px 2px",fontFamily:"inherit"}}>
                <div style={{fontSize:active?22:18}}>{n.e}</div>
                <div style={{fontSize:9,fontWeight:active?800:500,color:active?"#ffd700":"rgba(255,255,255,0.3)"}}>{n.label}</div>
                {active && <div style={{width:14,height:2,borderRadius:99,background:"#ffd700",marginTop:1}}/>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));

  </script>
</body>
</html>
