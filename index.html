  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;background:#000;}
body{overscroll-behavior:none;-webkit-tap-highlight-color:transparent;font-family:'Outfit',system-ui,-apple-system,sans-serif;}
input,textarea,button{font-family:inherit;}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:99px;background:rgba(255,255,255,0.1);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#FF9F0A;cursor:pointer;box-shadow:0 2px 8px rgba(255,159,10,0.5);}
input::placeholder{color:rgba(255,255,255,0.25);}
input[type=text]:focus,input[type=url]:focus{outline:none;border-color:rgba(255,159,10,0.6)!important;box-shadow:0 0 0 3px rgba(255,159,10,0.12)!important;}
::-webkit-scrollbar{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes vUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes vPop{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes vFade{from{opacity:0}to{opacity:1}}
@keyframes iUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes iPop{from{opacity:0;transform:scale(0.65)}to{opacity:1;transform:scale(1)}}
@keyframes iFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes trainFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.page{animation:fadeUp 0.2s cubic-bezier(0.16,1,0.3,1) forwards;}
.float{animation:floatY 3.5s ease-in-out infinite;}
.train-float{animation:trainFloat 3s ease-in-out infinite;}
.iup{animation:iUp 0.45s cubic-bezier(0.16,1,0.3,1) both;}
.ipop{animation:iPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;}
.ifloat{animation:iFloat 3.5s ease-in-out infinite;}
.id1{animation-delay:0.12s;opacity:0;}.id2{animation-delay:0.28s;opacity:0;}.id3{animation-delay:0.44s;opacity:0;}
button{transition:opacity 0.12s,transform 0.12s;}
button:active{opacity:0.7;transform:scale(0.97);}</style>
