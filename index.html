<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#000000"/>
  <title>DropPilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react,env">

const {useState}=React;
function App(){
const [n,setN]=useState(0);
return <div style={{background:’#000’,color:’#fff’,padding:20,fontFamily:‘sans-serif’}}>
<h2>DropPilot</h2>
<button onClick={()=>setN(n+1)}>Count: {n}</button>

  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load",function(){
        navigator.serviceWorker.register("sw.js").catch(function(){});
      });
    }
  </script>
</body>
</html>
