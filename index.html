const CSS=`*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;} html,body,#root{height:100%;background:#000;} body{overscroll-behavior:none;-webkit-tap-highlight-color:transparent;} input,textarea,button{font-family:inherit;} input[type=range]{-webkit-appearance:none;height:4px;border-radius:99px;background:rgba(255,255,255,0.12);outline:none;} input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#FF9F0A;cursor:pointer;box-shadow:0 2px 8px rgba(255,159,10,0.4);} input::placeholder{color:rgba(255,255,255,0.3);} input:focus,textarea:focus{border-color:rgba(255,159,10,0.6)!important;outline:none;box-shadow:0 0 0 3px rgba(255,159,10,0.12)!important;} ::-webkit-scrollbar{display:none;} @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}} @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}} @keyframes glowPulse{0%,100%{box-shadow:0 0 18px rgba(255,159,10,0.3)}50%{box-shadow:0 0 36px rgba(255,159,10,0.6)}} @keyframes borderPulse{0%,100%{border-color:rgba(255,159,10,0.35)}50%{border-color:rgba(255,159,10,0.8)}} @keyframes iUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}} @keyframes iPop{from{opacity:0;transform:scale(0.65)}to{opacity:1;transform:scale(1)}} @keyframes vUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}} @keyframes vPop{from{opacity:0;transform:scale(0.65)}to{opacity:1;transform:scale(1)}} @keyframes vFade{from{opacity:0}to{opacity:1}} @keyframes trainPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,159,10,0)}50%{box-shadow:0 0 0 8px rgba(255,159,10,0.2)}} @keyframes trainFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}} @keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.85)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}} @keyframes toastOut{from{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-50%) scale(0.85)}} @keyframes tabSlide{from{opacity:0;transform:translateY(18px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}} @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}} @keyframes shimmerSlide{0%{background-position:-200% 0}100%{background-position:200% 0}} @keyframes navPop{0%{transform:scale(1)}40%{transform:scale(1.28)}70%{transform:scale(0.92)}100%{transform:scale(1)}} @keyframes defenderPulse{0%,100%{box-shadow:0 0 0 0 rgba(191,90,242,0)}50%{box-shadow:0 0 0 10px rgba(191,90,242,0.15)}} @keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}} .page{animation:tabSlide 0.28s cubic-bezier(0.16,1,0.3,1) forwards;} .float{animation:floatY 3.5s ease-in-out infinite;} .glow{animation:glowPulse 3s ease-in-out infinite;} .border-pulse{animation:borderPulse 3s ease-in-out infinite;} .iup{animation:iUp 0.5s cubic-bezier(0.16,1,0.3,1) both;} .ipop{animation:iPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;} .id1{animation-delay:0.15s;opacity:0;}.id2{animation-delay:0.35s;opacity:0;}.id3{animation-delay:0.55s;opacity:0;} .card-in{animation:cardIn 0.35s cubic-bezier(0.16,1,0.3,1) both;} .c0{animation-delay:0.04s;opacity:0}.c1{animation-delay:0.10s;opacity:0}.c2{animation-delay:0.16s;opacity:0}.c3{animation-delay:0.22s;opacity:0}.c4{animation-delay:0.28s;opacity:0}.c5{animation-delay:0.34s;opacity:0}.c6{animation-delay:0.40s;opacity:0}.c7{animation-delay:0.46s;opacity:0}.c8{animation-delay:0.52s;opacity:0}.c9{animation-delay:0.58s;opacity:0} button{transition:all 0.14s cubic-bezier(0.16,1,0.3,1);} button:active{opacity:0.8;transform:scale(0.96);} .tip{transition:border-color 0.18s,transform 0.14s;} .tip:active{transform:scale(0.99);} .train-pulse{animation:trainPulse 2.2s ease-in-out infinite;} .train-float{animation:trainFloat 3s ease-in-out infinite;} .nav-pop{animation:navPop 0.4s cubic-bezier(0.34,1.56,0.64,1);} .defender-pulse{animation:defenderPulse 2.4s ease-in-out infinite;} .shimmer-locked{background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,0.04) 50%,transparent 70%);background-size:200% 100%;animation:shimmerSlide 2.2s ease-in-out infinite;}`;

async function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
async function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

const LEARN_CATS=[
{e:“🧠”,t:“Reading People”,sub:“Simple psychology you can use right now”,free:true,secs:[
{h:“The 2 Moments That Decide Your Rating”,body:“People don’t judge a delivery by the whole experience. They remember two things: the moment you handed them their food, and the last thing you said before you left. If you nail those two moments, customers will rate you 5 stars even after a long wait.”,tip:“Before every delivery, remind yourself: handoff and goodbye. Those two moments decide almost everything.”},
{h:“Use Their First Name Once”,body:“Your app shows you the customer’s first name. Most drivers never use it. Hearing your own name makes people feel seen instead of just handled. Use it exactly once at the door. Once feels warm. Twice feels weird.”,tip:“Try it on your next 5 deliveries. You’ll notice the difference immediately.”},
{h:“Match How They Talk to You”,body:“Some customers text casually. Others are formal. When you match someone’s style, they feel understood without knowing why. Casual customer gets a casual reply. Formal customer gets a polite reply.”,tip:“Read their texts before you arrive. It tells you everything about how they want to be talked to.”},
]},
{e:“🚪”,t:“At The Door”,sub:“Small habits that change how customers see you”,free:true,secs:[
{h:“Where to Stand When the Door Opens”,body:“Don’t stand dead center in the doorway. Stand slightly to the side instead. Hold the bag out. This position says ‘I’m here to give you something’ not ‘I’m in your way.’ Being slightly lower than the customer feels natural and friendly.”,tip:“Practice this on your next door delivery. You’ll see customers visibly relax.”},
{h:“How You Hold the Bag”,body:“One hand, bag swinging at your side looks like you’re carrying garbage. Two hands, bag level, held at chest height shows you cared about their food the whole way here. For anything with drinks  -  always two hands, always level.”,tip:“Two hands, chest height. Make it your default. No exceptions on drinks.”},
{h:“Wait One Beat Before You Leave”,body:“After you hand over the bag and say goodbye, pause for half a second. Make brief eye contact one more time. Then leave. This tiny pause makes customers feel like the delivery was a real human interaction.”,tip:“Count ‘one’ in your head after your sign-off. Then go.”},
]},
{e:“🔥”,t:“Handling Difficult Situations”,sub:“What to say when things go wrong”,free:false,secs:[
{h:“The 3-Step Formula When Someone Is Upset”,body:“Step 1: ‘I understand how you feel.’ Step 2: ‘A lot of customers feel the same way.’ Step 3: ‘What I’ve found is…’  -  now give them a next step. You’re not saying it’s your fault. You’re saying their frustration makes sense.”,tip:“Memorize: Feel, Felt, Found. Three steps. Works every time.”},
{h:“Slow Down When Someone Is Angry”,body:“When a customer is angry, your brain wants to talk faster to explain yourself. Don’t. Slow down instead. Calm is contagious. Don’t interrupt. Don’t list reasons it isn’t your fault. Just be steady and slow.”,tip:“The moment you feel defensive, speak slower and quieter  -  not faster and louder.”},
{h:“When the Customer Is Wrong”,body:“Sometimes a customer insists something happened that you know didn’t. You cannot tell them they’re wrong. Instead, redirect them to support. You’re not admitting fault. You’re pointing them at the fastest solution.”,tip:“Your job is not to win the argument. Your job is to end the interaction with a calm customer who has a path forward.”},
]},
{e:“💰”,t:“The Science of Tips”,sub:“Why people tip  -  and how to make it happen”,free:false,secs:[
{h:“The Two-Handed Handoff”,body:“When you use two hands to present the bag at chest height, it creates a real exchange instead of a drop-off. Customers feel the difference without knowing why. Try it for one week straight and track your tips.”,tip:“Two hands every time. It’s not just about the bag staying level.”},
{h:“Mention the Bad Weather”,body:“Briefly mentioning the weather in an empathetic way increases tips. ‘Stayed moving fast for you out there  -  cold one tonight!’ This creates a human moment. Empathy earns tips. Complaints ask for sympathy.”,tip:“One sentence. Warm, not whiny. ‘Kept it moving fast for you out there!’”},
{h:“Small Unexpected Extras Trigger Tipping”,body:“When someone gives you something they didn’t expect, they feel an urge to give something back. Extra napkins, drinks upright, a warm confirmation text. Here’s the key: mention it out loud. ‘Grabbed a few extra napkins in case you need them!’”,tip:“The mention is as important as the gesture. Say it out loud.”},
{h:“Protecting Tips That Were Pre-Set”,body:“Many platforms let customers tip before the delivery. That tip was based on their hope you’d do a good job. Your job is to confirm that hope. Every delivery, you’re either confirming or breaking the promise they made.”,tip:“Think of every delivery as confirming a promise the customer already made when they tipped upfront.”},
]},
{e:“📋”,t:“Recovery Scripts”,sub:“Exactly what to say when there’s a problem”,free:false,secs:[
{h:“Cold Food”,body:“Cold food is almost always the restaurant’s fault. Don’t say that out loud. Instead: ‘I’d contact support directly  -  they take temperature issues seriously and usually fix it fast.’ You’re giving them the fastest path to a solution.”,tip:“Never say ‘the restaurant had it sitting out.’ Redirect to support every time.”},
{h:“Missing Item”,body:“Never say ‘I checked the bag and everything was in there.’ Instead: ‘I picked up the sealed bag right from the restaurant. The fastest fix is to contact support right now.’ Let the platform handle it.”,tip:“Never claim you checked the bag. Always redirect to support. Every time.”},
{h:“When You Actually Made the Mistake”,body:“Own it fully and briefly. ‘That was completely my fault and I’m sorry. I should have done X and I didn’t.’ Then stop talking. No excuses. Studies show customers rate a service higher after a mistake handled with real ownership.”,tip:“Own it fully. One sentence. Then stop. No explanations.”},
]},
{e:“🗺️”,t:“Know Your Delivery”,sub:“Different situations need different approaches”,free:false,secs:[
{h:“Grocery Orders vs. Restaurant Orders”,body:“Restaurant customers want their food fast and hot. Grocery customers care about whether you picked good produce and communicated about anything out of stock. With grocery: be thorough. With restaurant: be fast and nail the handoff.”,tip:“Ask yourself: is this a ‘speed and warmth’ order or a ‘care and communication’ order?”},
{h:“Apartments vs. Houses”,body:“Houses are straightforward. Apartments: always text before trying to get in. ‘Hi! At the main entrance with your order  -  could you buzz me in?’ Never stand silently outside.”,tip:“Apartment rule: text first, always.”},
{h:“Time of Day Changes Everything”,body:“Lunch: customers are on a break, be fast. Dinner: warmth matters most. Late night: be quiet, clean drop, good photo. Morning: be upbeat, the bar is low early.”,tip:“Read the time like it’s an instruction. It tells you how to adjust your approach.”},
]},
{e:“🏆”,t:“Staying Sharp”,sub:“How to keep earning more over the long run”,free:true,secs:[
{h:“Every Delivery Is a Fresh Start”,body:“In gig delivery, every single order is rated on its own by a different person who knows nothing about your last delivery. A bad delivery doesn’t have to affect the next one  -  unless you carry the frustration with you.”,tip:“The customer you’re about to deliver to has never met you. They’re ready to give you 5 stars.”},
{h:“The 60-Second Reset”,body:“After a rough delivery: 1. Breathe. It’s over. 2. Remind yourself the next customer is a completely different person. 3. Pick one small thing to do well on the next delivery. That’s the whole reset.”,tip:“Set one small intention before each delivery. ‘I’m going to nail the handoff on this one.’”},
{h:“Burnout Warning Signs”,body:“Burnout sneaks up. Signs: you stop texting customers proactively, the handoff becomes a drop-and-go, low ratings make you angry instead of motivated. The fix is usually adjusting  -  fewer hours, different zone, tracking weekly tip average.”,tip:“Track your weekly tip average  -  not individual ratings. Trends motivate. Single data points just hurt.”},
]},
];

const BASICS_CATS=[
{e:“🚀”,t:“Starting Out”,sub:“What you need to know before your first delivery”,secs:[
{h:“What these apps actually are”,body:“DoorDash, Uber Eats, Spark, and Instacart are apps that pay you to pick up orders and drop them off. A customer orders food or groceries on their phone. The app finds a driver nearby  -  that’s you. You work when you want, stop when you want. Nobody is your boss.”},
{h:“How you make money”,body:“You earn a base pay for each delivery. On top of that, customers can add a tip. Tips are usually where the real money comes from. Some apps also offer extra bonuses during busy times called ‘boosts’ or ‘surges’  -  they’re worth taking advantage of.”},
{h:“What a rating is and why it matters”,body:“After every delivery, customers can rate you from 1 to 5 stars. Your average rating across all deliveries is your score. If your rating gets too low, the app gives you fewer orders, worse orders, or removes you. Aim for 4.7 or higher on every platform.”},
{h:“How to accept an order”,body:“When an order comes in, your phone buzzes and a screen pops up showing you the details  -  pickup, drop-off, and pay. You have a short window to accept or decline. If you accept, follow the map to the restaurant, then to the customer.”},
{h:“What happens if you make a mistake”,body:“Everyone makes mistakes. The most important thing is to stay calm and communicate. Text the customer right away. Be honest and apologize briefly. Support can often reverse a bad rating if you have evidence you did your best.”},
]},
{e:“📱”,t:“Your Phone”,sub:“The tech stuff made simple”,secs:[
{h:“Why GPS must stay on”,body:“GPS is what tells the app where you are. Every platform tracks your location during a delivery. If GPS is off and a customer claims you never arrived, you have no way to prove them wrong. Go to your phone Settings, find Location, and make sure it’s turned ON.”},
{h:“How to keep your battery alive”,body:“Running GPS and maps all day drains your battery fast. Charge to 100% before your shift. Bring a car charger  -  not optional, it’s essential. If your battery hits 20%, plug in immediately.”},
{h:“Switching between apps and maps”,body:“You’ll often need to flip between your delivery app and Google Maps or Waze. Tap the square button at the bottom of your phone to see all open apps. Tap the one you need. Your place in the delivery app stays exactly where it was.”},
{h:“What to do if the app freezes”,body:“If the app freezes: press the home button, wait 5 seconds, then reopen it. If it crashes completely: close it fully by swiping it away in your recent apps, then reopen. Your delivery will still be there.”},
{h:“Make sure notifications are on”,body:“If notifications are off, you’ll miss orders completely. Go to Settings, find Notifications, find the delivery app, and make sure everything is switched ON. Also make sure your phone is NOT on silent mode during your shift.”},
]},
{e:“🏃”,t:“During a Delivery”,sub:“What to do from start to finish”,secs:[
{h:“Step by step  -  your first delivery”,body:“1. Accept the order. 2. Drive to the restaurant. 3. Go inside, give them your name, and wait for the order. 4. Pick up the bag  -  handle it carefully. 5. Drive to the customer’s address. 6. Hand off the food or leave it at the door. 7. Take a photo. 8. Mark it as delivered in the app.”},
{h:“What ‘Leave at Door’ means”,body:“Leave at Door means do NOT knock or ring the bell. Place the bag neatly at the door, take a clear photo showing the bag AND the door number, then mark it delivered. Do not knock. Do not ring. Just leave it clean and move on.”},
{h:“Taking the delivery photo”,body:“After every delivery, take a photo before you walk away. Your photo should show the bag sitting at the door with the door number or address visible. This photo is your proof that you delivered. Take it every single time.”},
{h:“What to do if you can’t find the address”,body:“Don’t panic and don’t just leave. First: double-check the address in the app. Second: call the customer using the in-app call button. Third: if no answer, send a text. Give them 2-3 minutes. If still no answer, contact support before leaving.”},
{h:“What to do if the restaurant doesn’t have your order”,body:“Stay calm. Show the restaurant your app screen. Ask them to check under the customer’s name. If they truly don’t have it, contact support through the app immediately  -  do not leave without notifying support.”},
]},
{e:“💸”,t:“Getting Paid”,sub:“How the money actually works”,secs:[
{h:“How and when you get paid”,body:“Most platforms pay once a week, automatically deposited to your bank account. You can also cash out early through Fast Pay or Instant Pay. To set this up: go to your app’s Earnings section and add your bank account or debit card.”},
{h:“What a boost or surge means”,body:“During busy times  -  lunch, dinner, weekends, bad weather  -  apps offer extra money per delivery. This might show up as ‘Peak Pay,’ ‘Surge,’ or a dollar amount added on top of regular pay.”},
{h:“Why some orders pay more than others”,body:“Longer distance = more pay. Harder deliveries = more pay. Busy times = more pay. Some orders also have bigger tips already added by the customer before you even accept. A good rule of thumb: if the pay is less than $1 per mile, it may not be worth taking.”},
{h:“Tips  -  when they show up and why they vary”,body:“Some tips appear immediately after delivery. Others show up hours later because customers add them after they receive the food. Don’t be alarmed if a tip isn’t there right away. The best way to earn more tips is to focus on every delivery: warm greeting, careful handling, confirmation text.”},
]},
{e:“🔴”,t:“DoorDash Basics”,sub:“Platform-specific things every DoorDash driver needs to know”,secs:[
{h:“How DoorDash orders work”,body:“When an order comes in, you see the pickup restaurant, drop-off address, pay, and distance. You have about 45 seconds to accept or decline. Drive to the restaurant, tap ‘Arrived at Store’, pick up the order, tap ‘Picked Up’, then drive to the customer.”},
{h:“The DoorDash rating system”,body:“DoorDash shows you your last 100 deliveries. A score below 4.2 puts you at risk of deactivation. A score above 4.7 keeps you in good standing. If you get a bad rating that wasn’t your fault, you can contact support and request a review.”},
{h:“Completion rate”,body:“Your completion rate is the percentage of orders you accept and then actually complete. DoorDash requires a minimum of 80% completion. Only accept orders you’re sure you can complete.”},
{h:“Top Dasher status”,body:“Top Dasher is a status for drivers with 4.7+ rating, 95%+ acceptance rate, 95%+ completion rate, 100+ deliveries in the month, and at least 200 total deliveries. Top Dashers get to dash anytime without scheduling.”},
]},
{e:“🟢”,t:“Uber Eats Basics”,sub:“Platform-specific things every Uber Eats driver needs to know”,secs:[
{h:“How Uber Eats orders work”,body:“Go online in the app and orders start coming to you. When one arrives, you see the restaurant, drop-off, and fare. Accept it and head to the restaurant. For contactless: leave at the door, take a photo through the app, and confirm delivery.”},
{h:“Your Uber Eats rating”,body:“Uber requires drivers to maintain a 4.7 or higher rating. Below that, you may see fewer high-paying trips. Uber allows removal of ratings caused by things outside your control  -  restaurant errors, navigation problems, long wait times.”},
{h:“Trip ID  -  what it is and why you need it”,body:“Every delivery has a Trip ID  -  a unique code for that specific order. If you ever need to dispute something with support, you must include the Trip ID. Screenshot it any time a delivery feels off.”},
{h:“Uber Pro levels”,body:“Uber has a tier system: Blue, Gold, Platinum, Diamond. Higher tiers unlock better benefits. Don’t stress about tiers when starting  -  focus on good service first and the levels will follow.”},
]},
{e:“🔵”,t:“Spark Basics”,sub:“Platform-specific things every Spark driver needs to know”,secs:[
{h:“What makes Spark different”,body:“Spark is Walmart’s delivery service. Instead of picking up food from a restaurant, you go to a Walmart store and shop for a customer’s grocery order. You scan each item as you pick it up, then deliver the bags to the customer’s home.”},
{h:“How to handle out-of-stock items”,body:“Don’t just skip it. Open the Spark app, find the item, and mark it as unavailable. The app gives you options to substitute it with something similar. Always message the customer through the app before you check out to let them know.”},
{h:“Scanning every item  -  why it’s critical”,body:“Spark tracks which items you scanned. If a customer says an item is missing and your scan record shows you scanned it, that’s your proof. Scan every single item, every time, no exceptions.”},
{h:“Your Spark driver rating”,body:“Spark tracks both your customer rating and your on-time rate separately. Both affect which batches you can access. Better ratings = access to bigger, better-paying batches.”},
]},
{e:“🟩”,t:“Instacart Basics”,sub:“Platform-specific things every Instacart shopper needs to know”,secs:[
{h:“What Instacart shoppers actually do”,body:“Instacart pays you to shop for customers at grocery stores, then deliver the bags to their home. You get a list of items, find them in the store, scan them, check out, and deliver. The whole thing  -  shopping and delivering  -  is called a ‘batch.’”},
{h:“How to handle replacements”,body:“If an item isn’t available, the app shows you approved replacements. Before you check out, always message the customer to let them know what you’re substituting. It protects your rating if they’re not happy with the sub.”},
{h:“Your Batch ID  -  always note it”,body:“Every Instacart order has a Batch ID. This is what support uses to find your record if anything goes wrong. Any time a delivery feels off, take a screenshot of the Batch ID before you move on.”},
{h:“The 4.7 rating  -  why it’s the key number”,body:“Instacart shoppers rated below 4.7 see fewer batches and lower-paying ones. Above 4.7 keeps you in good standing. Above 4.8 unlocks premium batches.”},
]},
];

function VideoPlayer({video}){
const [scene,setScene]=useState(0);
const [progress,setProgress]=useState(0);
const [playing,setPlaying]=useState(false);
const elapsed=useRef(0);
const rafRef=useRef(null);
const t0Ref=useRef(null);
useEffect(()=>{restart(false);return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);};},[video.id]);
function restart(autoplay=true){
if(rafRef.current)cancelAnimationFrame(rafRef.current);
elapsed.current=0;t0Ref.current=null;
setScene(0);setProgress(0);setPlaying(autoplay);
if(autoplay)rafRef.current=requestAnimationFrame(tick);
}
function tick(ts){
if(!t0Ref.current)t0Ref.current=ts;
elapsed.current=ts-t0Ref.current;
setProgress(Math.min(elapsed.current/video.dur*100,100));
let sc=0;
for(let i=video.scenes.length-1;i>=0;i–){if(elapsed.current>=video.scenes[i].t){sc=i;break;}}
setScene(sc);
if(elapsed.current<video.dur){rafRef.current=requestAnimationFrame(tick);}
else{setPlaying(false);}
}
function togglePlay(){
if(!playing&&elapsed.current>=video.dur){restart(true);return;}
if(playing){cancelAnimationFrame(rafRef.current);setPlaying(false);}
else{const saved=elapsed.current;t0Ref.current=null;rafRef.current=requestAnimationFrame(ts=>{t0Ref.current=ts-saved;tick(ts);});setPlaying(true);}
}
function jumpToScene(si){
if(rafRef.current)cancelAnimationFrame(rafRef.current);
const targetMs=video.scenes[si].t;
elapsed.current=targetMs;t0Ref.current=null;
setScene(si);setProgress(targetMs/video.dur*100);
const saved=targetMs;
rafRef.current=requestAnimationFrame(ts=>{t0Ref.current=ts-saved;tick(ts);});
setPlaying(true);
}
const sc=video.scenes[scene];
const vc=video.color;
const A=”#FF9F0A”,G=”#30D158”,R=”#FF453A”;

function copyText(text,key){
try{navigator.clipboard.writeText(text);}catch(e){
const el=document.createElement(‘textarea’);
el.value=text;document.body.appendChild(el);el.select();
document.execCommand(‘copy’);document.body.removeChild(el);
}
setCopiedKey(key);
showToast(‘Copied!’);
setTimeout(()=>setCopiedKey(null),2000);
}

const nc={…todayChecks,[i]:!todayChecks[i]};
saveTodayChecks(nc);
const count=Object.values(nc).filter(Boolean).length;
if(count===6&&!streakSaved){
const today=getTodayKey();
if(streakData.lastDate!==today){
const yesterday=getYesterdayKey();
const newStreak=streakData.lastDate===yesterday?streakData.streak+1:1;
const hist=[…( streakData.history||[])].slice(-6);
hist.push(today);
const nd={streak:newStreak,lastDate:today,history:hist};
setStreakData(nd);
save(‘dp3-streak’,nd);
setStreakSaved(true);
showToast(‘Streak: ‘+newStreak+’ day’+(newStreak===1?’’:‘s’)+’!’);
}
}
}

}
