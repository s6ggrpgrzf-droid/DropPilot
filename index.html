*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;background:#000;overscroll-behavior:none;}
body{-webkit-tap-highlight-color:transparent;font-family:'Outfit',system-ui,sans-serif;}
input,textarea,button{font-family:inherit;}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:99px;background:rgba(255,255,255,0.12);outline:none;width:100%;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#FF9F0A;cursor:pointer;}
input::placeholder{color:rgba(255,255,255,0.3);}
input:focus,textarea:focus{outline:none;}
::-webkit-scrollbar{display:none;}
button{cursor:pointer;transition:opacity 0.14s;}
button:active{opacity:0.75;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes tabIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
@keyframes navPop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
.tab-in{animation:tabIn 0.25s ease both;}
.pop-in{animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}
.fade-up{animation:fadeUp 0.3s ease both;}
  </style>

try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch(e) { return fb; }
}
function lsSet(k, v) {

}
function todayKey() {
var d = new Date();
return d.getFullYear() + ‘-’ + (d.getMonth()+1) + ‘-’ + d.getDate();
}
function yesterdayKey() {
var d = new Date(); d.setDate(d.getDate()-1);
return d.getFullYear() + ‘-’ + (d.getMonth()+1) + ‘-’ + d.getDate();
}
