  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;background:#000;}
body{overscroll-behavior:none;-webkit-tap-highlight-color:transparent;font-family:'Outfit',system-ui,-apple-system,sans-serif;}
input,textarea,button{font-family:inherit;}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:99px;background:rgba(255,255,255,0.1);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#FF9F0A;cursor:pointer;box-shadow:0 2px 8px rgba(255,159,10,0.5);}
input::placeholder{color:rgba(255,255,255,0.25);}
input[type=text]:focus,input[type=url]:focus{outline:none;border-color:rgba(255,159,10,0.6)!important;box-shadow:0 0 0 3px rgba(255,159,10,0.12)!important;}
::-webkit-scrollbar{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes vUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes vPop{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes vFade{from{opacity:0}to{opacity:1}}
@keyframes iUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes iPop{from{opacity:0;transform:scale(0.65)}to{opacity:1;transform:scale(1)}}
@keyframes iFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes trainFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.page{animation:fadeUp 0.2s cubic-bezier(0.16,1,0.3,1) forwards;}
.float{animation:floatY 3.5s ease-in-out infinite;}
.train-float{animation:trainFloat 3s ease-in-out infinite;}
.iup{animation:iUp 0.45s cubic-bezier(0.16,1,0.3,1) both;}
.ipop{animation:iPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;}
.ifloat{animation:iFloat 3.5s ease-in-out infinite;}
.id1{animation-delay:0.12s;opacity:0;}.id2{animation-delay:0.28s;opacity:0;}.id3{animation-delay:0.44s;opacity:0;}
button{transition:opacity 0.12s,transform 0.12s;}
button:active{opacity:0.7;transform:scale(0.97);}</style>
</head>

async function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ─── Intro Animation ──────────────────────────────────────────────────────────
function IntroAnimation({onDone}) {
const [scene, setScene] = useState(0);
const [progress, setProgress] = useState(0);
const TOTAL = 30000;
const SCENES = [
{id:0,start:0},
{id:1,start:4000},
{id:2,start:8500},
{id:3,start:13500},
{id:4,start:18000},
{id:5,start:22500},
{id:6,start:26500},
];

useEffect(()=>{
const t0 = Date.now();
const tick = ()=>{
const elapsed = Date.now()-t0;
setProgress(Math.min(elapsed/TOTAL*100,100));
for(let i=SCENES.length-1;i>=0;i--){if(elapsed>=SCENES[i].start){setScene(SCENES[i].id);break;}}
if(elapsed<TOTAL){requestAnimationFrame(tick);}else{setTimeout(onDone,400);}
};
requestAnimationFrame(tick);
},[]);

const A=C.amber, G=C.green, B=C.blue;
const ss=(n)=>({
position:"absolute",inset:0,
display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
padding:"36px 28px",
opacity:scene===n?1:0,
transition:"opacity 0.5s ease",
pointerEvents:scene===n?"auto":"none",
});
const Div=({color=A})=><div style={{width:36,height:2,borderRadius:99,background:`linear-gradient(90deg,${color},#fff)`,margin:"0 auto 16px",opacity:0,animation:"iUp 0.4s 0.35s cubic-bezier(0.16,1,0.3,1) both"}}/>;

return(
<div style={{position:"fixed",inset:0,background:C.bg,zIndex:999,fontFamily:C.sans,color:C.text,overflow:"hidden",maxWidth:430,margin:"0 auto"}}>
<div style={{position:"absolute",top:0,left:0,height:3,width:`${progress}%`,background:`linear-gradient(90deg,${A},#ffd280)`,boxShadow:`0 0 10px rgba(245,166,35,0.7)`,transition:"width 0.08s linear",zIndex:10}}/>
<button onClick={onDone} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:20,padding:"6px 14px",color:"rgba(255,255,255,0.35)",fontSize:11,fontWeight:700,cursor:"pointer",zIndex:10,fontFamily:C.sans,letterSpacing:"0.3px"}}>Skip</button>

);

    {[{id:"tips",l:"Tips",e:"⭐",ac:C.amber},{id:"templates",l:"Scripts",e:"💬",ac:C.blue},{id:"defend",l:"Defend",e:"🛡️",ac:C.purple},{id:"tiers",l:"Tiers",e:"📊",ac:C.green},{id:"today",l:"Today",e:"📅",ac:"#5AC8FA"},{id:"train",l:"Train",e:"🎓",ac:C.amber}].map(n=>(
      <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,background:"transparent",border:"none",cursor:"pointer",padding:"6px 2px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <div style={{width:46,height:30,borderRadius:10,background:tab===n.id?`${n.ac}20`:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:tab===n.id?19:17}} dangerouslySetInnerHTML={{__html:n.e}}/>
        </div>
        <span style={{fontSize:10,fontWeight:600,color:tab===n.id?n.ac:"rgba(255,255,255,0.35)"}}>{n.l}</span>
      </button>
    ))}
  </div>

  {/* Paywall Modal */}
  {showPay && (
    <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={()=>{setShowPay(false);setPayStep("offer");setCodeIn("");setCodeErr("");}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.78)"}}/>
      <div style={{position:"relative",background:"linear-gradient(180deg,#12151a,#0d0f13)",borderTop:"1px solid rgba(255,255,255,0.08)",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:430,zIndex:1}}>
        {/* Full paywall modal content from original - fixed */}
      </div>
    </div>
  )}
</div>
);
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
